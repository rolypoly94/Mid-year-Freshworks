display_information:
  name: FPI Portal
  description: Mid-year performance check-ins inside Slack.
  background_color: "#0b4f6c"
features:
  bot_user:
    display_name: FPI Portal
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    request_url: https://REPLACE_WITH_YOUR_SERVER_URL/api/slack/events
    bot_events: []
  interactivity:
    is_enabled: true
    request_url: https://REPLACE_WITH_YOUR_SERVER_URL/api/slack/interact
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
